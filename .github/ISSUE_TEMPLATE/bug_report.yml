name: Bug report
description: Something is broken or behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Include steps to reproduce and which component is affected (Android, CLI, relay server).
        See [CONTRIBUTING.md](../../CONTRIBUTING.md) if you plan to open a fix PR.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Android app
        - CLI
        - Relay server (Cloudflare / local)
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. v1.2.0 or git SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node 22, Android version, relay URL, etc.
