name: Security audit

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: ['.', server]
    steps:
      - uses: actions/checkout@v4
      - name: Verify no signing keys in repository
        run: bash scripts/verify-no-signing-in-repo.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.dir == '.' && 'package-lock.json' || 'server/package-lock.json' }}
      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm ci
      - name: npm audit (high+)
        working-directory: ${{ matrix.dir }}
        run: npm audit --audit-level=high
